<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TKR アプリケーション</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="stylesheet" href="/static/css/table.css">
    <link rel="stylesheet" href="/static/css/masteredit.css">
    <link rel="stylesheet" href="/static/css/config.css">
    <link rel="stylesheet" href="/static/css/inventory_adjustment.css">
    <link rel="stylesheet" href="/static/css/search_modal.css">
    </head>
<body>
    <header id="main-header">
        <button id="datViewBtn" class="btn">DAT取込</button>
        <button id="usageViewBtn" class="btn">USAGE取込</button>
        <button id="inventoryAdjustmentViewBtn" class="btn">棚卸調整</button>
        <button id="masterEditViewBtn" class="btn">マスタ編集</button>
        <button id="configViewBtn" class="btn">設定</button>
    </header>

    <main>
        <div id="dat-upload-view" class="view active">
            <h1>ファイルアップロード (DAT)</h1>
    
            <div style="margin-bottom: 20px;">
                <button id="datUploadBtn" class="btn">DATファイル選択</button>
                <input type="file" id="datFileInput" multiple accept=".dat,.DAT" class="hidden">
            </div>

            <div class="filter-container" style="padding: 10px; margin-bottom: 10px; background-color: #f7f7f7; border: 1px solid #ddd;">
                <fieldset style="border: 1px solid #ccc; padding: 5px;">
                    <legend>GS1-128 バーコード検索 (DAT)</legend>
                    <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
                        <div class="form-group" style="flex-basis: 300px; flex-grow: 1;">
                            <label for="dat-search-barcode">バーコード入力 (JAN+期限+ロット):</label>
                            <input type="text" id="dat-search-barcode" style="padding: 3px; font-size: inherit; width: 100%; box-sizing: border-box;" placeholder="0114987..." autofocus autocomplete="off">
                        </div>
                        <button id="datSearchBtn" class="btn" style="padding: 5px 10px; margin-left: auto; align-self: flex-end;">検索</button>
                    </div>
                </fieldset>
            </div>
            
            <div id="datUploadResultContainer">
                <p>「DATファイル選択」ボタンを押してファイルを選んでください。</p>
            </div>
            
            <div id="datTableContainer" class="table-container">
                <table id="datMainDataTable" class="data-table">
                </table>
            </div>
        </div>
        <div id="usage-upload-view" class="view">
            <h1>ファイルアップロード (USAGE)</h1>
    
            <div style="margin-bottom: 20px;">
                <button id="usageUploadBtn" class="btn">USAGEファイル選択</button>
                <input type="file" id="usageFileInput" accept=".csv,.CSV,.txt,.TXT" class="hidden">
            </div>

            <div id="usageUploadResultContainer">
                <p>「USAGEファイル選択」ボタンを押してファイルを選んでください。</p>
            </div>
            
            <div id="usageTableContainer" class="table-container">
                <table id="usageMainDataTable" class="data-table">
                </table>
            </div>
        </div>
        <div id="inventory-adjustment-view" class="view">
            <h1>棚卸調整 (1品目ごと)</h1>
            <div class="filter-container" style="padding: 10px; margin-bottom: 10px; background-color: #f0f8ff;">
                <fieldset style="border: 1px solid #ccc; padding: 5px;">
                    <legend>品目検索</legend>
                    <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end;">
                        <div class="form-group" style="flex-basis: 250px; flex-grow: 1;">
                            <label for="ia-barcode-input">GS1バーコードスキャン:</label>
                            <form id="ia-barcode-form" style="margin: 0;">
                                <input type="text" id="ia-barcode-input" style="padding: 3px; font-size: inherit;" autocomplete="off" placeholder="GS1-128 (JAN+期限+ロット)">
                            </form>
                        </div>
                        <div class="form-group" style="flex-basis: 100px;">
                            <label for="ia-dosageForm">内外注区分:</label>
                            <select id="ia-dosageForm" style="padding: 3px; font-size: inherit;">
                                <option value="">すべて</option>
                                <option value="内">内</option>
                                <option value="外">外</option>
                                <option value="注">注</option>
                                <option value="他">他</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex-basis: 200px;">
                            <label for="ia-kanaName">カナ名 (前方一致):</label>
                            <input type="text" id="ia-kanaName" style="padding: 3px; font-size: inherit;" autocomplete="off">
                        </div>
                        <div class="form-group" style="flex-basis: 100px;">
                            <label for="ia-shelf-number">棚番 (部分一致):</label>
                            <input type="text" id="ia-shelf-number" style="padding: 3px; font-size: inherit;" autocomplete="off">
                        </div>
                        <button id="ia-select-product-btn" class="btn" style="padding: 5px 10px;">品目を選択...</button>
                    </div>
                </fieldset>
            </div>
            <div id="inventory-adjustment-output" class="table-container">
                <p>上記検索条件で品目を指定してください。</p>
            </div>
        </div>
        <div id="master-edit-view" class="view">
            <h1>マスタ編集</h1>
            <div class="filter-container" style="padding: 10px; margin-bottom: 10px;">
                <fieldset style="border: 1px solid #ccc; padding: 5px;">
                    <legend>検索条件</legend>
                    <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
                        <div class="form-group">
                            <label style="font-weight: bold;">内外注区分:</label>
                            <label><input type="radio" name="usage_class" value="内" checked> 内</label>
                            <label><input type="radio" name="usage_class" value="外"> 外</label>
                            <label><input type="radio" name="usage_class" value="注"> 注</label>
                            <label><input type="radio" name="usage_class" value="他"> 他</label>
                        </div>
                        <div class="form-group" style="flex-basis: 200px;">
                            <label for="master-search-prod-name">製品名 (部分一致):</label>
                            <input type="text" id="master-search-prod-name" style="padding: 3px; font-size: inherit;" autocomplete="off">
                        </div>
                        <div class="form-group" style="flex-basis: 200px;">
                            <label for="master-search-kana-name">カナ名 (前方一致):</label>
                            <input type="text" id="master-search-kana-name" style="padding: 3px; font-size: inherit;" autocomplete="off">
                        </div>
                        <div class="form-group" style="flex-basis: 200px;">
                            <label for="master-search-generic-name">一般名 (部分一致):</label>
                            <input type="text" id="master-search-generic-name" style="padding: 3px; font-size: inherit;" autocomplete="off">
                        </div>
                        <div class="form-group" style="flex-basis: 100px;">
                            <label for="master-search-shelf-number">棚番 (完全一致):</label>
                            <input type="text" id="master-search-shelf-number" style="padding: 3px; font-size: inherit;" autocomplete="off">
                        </div>
                        <button id="masterSearchBtn" class="btn" style="padding: 5px 10px; margin-left: auto;">検索</button>
                    </div>
                </fieldset>
            </div>
            <div id="masterListContainer" class="table-container">
                <table id="masterListTable" class="data-table">
                    <thead>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>
        <div id="config-view" class="view">
            <h1>設定</h1>
            <section class="config-section">
                <h2>パス設定</h2>
                <div class="config-form-container">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="config-dat-folder-path">伝票取込フォルダパス (DAT):</label>
                            <input type="text" id="config-dat-folder-path" autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label for="config-usage-folder-path">処方取込フォルダパス (CSV):</label>
                            <input type="text" id="config-usage-folder-path" autocomplete="off">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button id="configSavePathBtn" class="btn">パス保存</button>
                    </div>
                </div>
            </section>
            <section class="config-section">
                <h2>集計設定</h2>
                <div class="config-form-container">
                    <div class="form-row">
                        <div class="form-group" style="flex-basis: 150px;">
                            <label for="config-calculation-days">在庫集計期間 (日数):</label>
                            <input type="number" id="config-calculation-days" autocomplete="off" value="90">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button id="configSaveDaysBtn" class="btn">集計期間保存</button>
                    </div>
                </div>
            </section>
            <section class="config-section">
                <h2>卸コード管理</h2>
                <div class="config-form-container">
                    <fieldset>
                        <legend>新規卸コード追加</legend>
                        <div class="form-row">
                            <div class="form-group" style="flex-basis: 150px;">
                                <label for="config-wholesaler-code">卸コード:</label>
                                <input type="text" id="config-wholesaler-code" autocomplete="off" maxlength="10">
                            </div>
                            <div class="form-group" style="flex-basis: 300px;">
                                <label for="config-wholesaler-name">卸名:</label>
                                <input type="text" id="config-wholesaler-name" autocomplete="off">
                            </div>
                            <div class="form-actions">
                                <button id="configAddWholesalerBtn" class="btn">追加</button>
                            </div>
                        </div>
                    </fieldset>
                </div>
                <div id="wholesalerListContainer" class="table-container" style="max-height: 300px; margin-top: 10px;">
                    <table id="wholesalerListTable" class="data-table">
                        <thead>
                            <tr>
                                <th style="width: 25%;">卸コード</th>
                                <th style="width: 60%;">卸名</th>
                                <th style="width: 15%;">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
        </main>

    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <span id="loading-message">処理中...</span>
    </div>
    <div id="notification-box"></div>

    <div id="masterEditModalOverlay" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>製品マスター編集</h2>
            <form id="masterEditForm" autocomplete="off">
                <div class="form-row readonly-group">
                    <div class="form-group" style="flex-basis: 120px;">
                        <label for="edit-yj-code">YJコード (編集不可: JCSHMS)</label>
                        <input type="text" id="edit-yj-code" class="readonly-field" readonly>
                    </div>
                    <div class="form-group" style="flex-basis: 120px;">
                        <label for="view-product-code">JANコード (キー)</label>
                        <input type="text" id="view-product-code" class="readonly-field" readonly>
                        <input type="hidden" id="edit-product-code">
                    </div>
                    <div class="form-group" style="flex-basis: 120px;">
                        <label for="edit-gs1-code">GS1コード (編集不可: JCSHMS)</label>
                        <input type="text" id="edit-gs1-code" class="readonly-field" readonly>
                    </div>
                    <div class="form-group" style="flex-basis: 100px;">
                        <label for="edit-origin">由来 (編集不可)</label>
                        <input type="text" id="edit-origin" class="readonly-field" readonly>
                    </div>
                </div>
                <div class="form-row readonly-group">
                    <div class="form-group" style="flex-basis: 300px;">
                        <label for="edit-product-name">製品名 (編集不可: JCSHMS)</label>
                        <input type="text" id="edit-product-name" class="readonly-field" readonly>
                    </div>
                    <div class="form-group" style="flex-basis: 300px;">
                        <label for="edit-kana-name">カナ名 (編集不可: JCSHMS)</label>
                        <input type="text" id="edit-kana-name" class="readonly-field" readonly>
                    </div>
                     <div class="form-group" style="flex-basis: 200px;">
                        <label for="edit-kana-name-short">カナ名短 (編集不可: JCSHMS)</label>
                        <input type="text" id="edit-kana-name-short" class="readonly-field" readonly>
                    </div>
                </div>
                <div class="form-row readonly-group">
                    <div class="form-group" style="flex-basis: 300px;">
                        <label for="edit-generic-name">一般名 (編集不可: JCSHMS)</label>
                        <input type="text" id="edit-generic-name" class="readonly-field" readonly>
                    </div>
                    <div class="form-group" style="flex-basis: 300px;">
                        <label for="edit-maker-name">メーカー名 (編集不可: JCSHMS)</label>
                        <input type="text" id="edit-maker-name" class="readonly-field" readonly>
                    </div>
                </div>
                <div class="form-row readonly-group">
                    <div class="form-group" style="flex-basis: 80px;">
                        <label for="edit-usage-classification">内外注</label>
                        <input type="text" id="edit-usage-classification" class="readonly-field" readonly>
                    </div>
                    <div class="form-group" style="flex-basis: 150px;">
                        <label for="edit-package-form">包装形態</label>
                        <input type="text" id="edit-package-form" class="readonly-field" readonly>
                    </div>
                    <div class="form-group" style="flex-basis: 100px;">
                        <label for="edit-yj-unit-name">YJ単位</label>
                        <input type="text" id="edit-yj-unit-name" class="readonly-field" readonly>
                    </div>
                     <div class="form-group" style="flex-basis: 100px;">
                        <label for="edit-yj-pack-unit-qty">YJ包装数</label>
                        <input type="number" id="edit-yj-pack-unit-qty" class="readonly-field" readonly>
                    </div>
                    <div class="form-group" style="flex-basis: 100px;">
                        <label for="edit-jan-pack-inner-qty">JAN入数</label>
                        <input type="number" id="edit-jan-pack-inner-qty" class="readonly-field" readonly>
                    </div>
                     <div class="form-group" style="flex-basis: 100px;">
                        <label for="edit-jan-unit-code">JAN単位CD</label>
                        <input type="number" id="edit-jan-unit-code" class="readonly-field" readonly>
                    </div>
                     <div class="form-group" style="flex-basis: 100px;">
                        <label for="edit-jan-pack-unit-qty">JAN包装数</label>
                        <input type="number" id="edit-jan-pack-unit-qty" class="readonly-field" readonly>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group" style="flex-basis: 100px;">
                        <label for="edit-nhi-price">薬価 (編集不可: JCSHMS)</label>
                        <input type="number" id="edit-nhi-price" class="readonly-field" readonly>
                    </div>
                    <div class="form-group" style="flex-basis: 100px;">
                        <label for="edit-purchase-price">仕入単価 (編集可)</label>
                        <input type="number" id="edit-purchase-price">
                    </div>
                     <div class="form-group" style="flex-basis: 200px;">
                        <label for="edit-supplier-wholesale">仕入卸 (編集可)</label>
                        <input type="text" id="edit-supplier-wholesale">
                    </div>
                </div>
                <div class="form-row">
                     <div class="form-group" style="flex-basis: 100px;">
                        <label for="edit-group-code">薬品分類CD (編集可)</label>
                        <input type="text" id="edit-group-code">
                    </div>
                    <div class="form-group" style="flex-basis: 100px;">
                        <label for="edit-shelf-number">棚番 (編集可)</label>
                        <input type="text" id="edit-shelf-number">
                    </div>
                    <div class="form-group" style="flex-basis: 100px;">
                        <label for="edit-category">カテゴリー (編集可)</label>
                        <input type="text" id="edit-category">
                    </div>
                     <div class="form-group" style="flex-basis: 300px;">
                        <label for="edit-user-notes">備考 (編集可)</label>
                        <input type="text" id="edit-user-notes">
                    </div>
                </div>
                <div class="form-row readonly-group">
                    <div class="form-group" style="flex-basis: 50px;"><label for="edit-flag-poison">毒</label><input type="number" id="edit-flag-poison" class="readonly-field" readonly></div>
                    <div class="form-group" style="flex-basis: 50px;"><label for="edit-flag-deleterious">劇</label><input type="number" id="edit-flag-deleterious" class="readonly-field" readonly></div>
                    <div class="form-group" style="flex-basis: 50px;"><label for="edit-flag-narcotic">麻</label><input type="number" id="edit-flag-narcotic" class="readonly-field" readonly></div>
                    <div class="form-group" style="flex-basis: 50px;"><label for="edit-flag-psychotropic">向</label><input type="number" id="edit-flag-psychotropic" class="readonly-field" readonly></div>
                    <div class="form-group" style="flex-basis: 50px;"><label for="edit-flag-stimulant">覚</label><input type="number" id="edit-flag-stimulant" class="readonly-field" readonly></div>
                    <div class="form-group" style="flex-basis: 50px;"><label for="edit-flag-stimulant-raw">覚原</label><input type="number" id="edit-flag-stimulant-raw" class="readonly-field" readonly></div>
                </div>
                 <div class="form-row readonly-group">
                    <div class="form-group" style="flex-basis: 100px;">
                        <label for="edit-is-order-stopped">発注停止</label>
                        <input type="number" id="edit-is-order-stopped" class="readonly-field" readonly>
                    </div>
                     <div class="form-group" style="flex-basis: 300px;">
                        <label for="edit-specification">仕様</label>
                        <input type="text" id="edit-specification" class="readonly-field" readonly>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" id="saveMasterBtn" class="btn">保存</button>
                    <button type="button" id="cancelEditMasterBtn" class="btn">閉じる</button>
                </div>
            </form>
        </div>
    </div>
    <div id="tkr-search-modal-overlay" class="modal-overlay hidden">
        <div class="modal-content" id="tkr-search-modal-content">
            <h2>品目検索</h2>
            <div class="filter-container" style="background-color: #f4f4f4;">
                <div style="display: flex; gap: 10px; align-items: flex-end;">
                    <div class="form-group" style="flex-grow: 1;">
                        <label for="product-search-input">検索 (製品名, カナ名)</label>
                        <input type="text" id="product-search-input" style="font-size: 1.1em; padding: 4px;" autocomplete="off">
                    </div>
                    <button id="product-search-btn" class="btn" style="padding: 5px 10px;">検索</button>
                </div>
            </div>
            <div id="search-results-container" class="table-container" style="max-height: 60vh; overflow-y: auto; margin-top: 10px;">
                <table id="search-results-table" class="data-table">
                    <thead>
                        <tr>
                            <th style="width: 35%;">製品名</th>
                            <th style="width: 15%;">メーカー</th>
                            <th style="width: 20%;">包装仕様</th>
                            <th style="width: 10%;">YJコード</th>
                            <th style="width: 10%;">JANコード</th>
                            <th style="width: 10%;">選択</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="6" class="center">検索キーワードを入力してください。</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="form-actions" style="margin-top: 15px;">
                <button type="button" id="closeSearchModalBtn" class="btn">閉じる</button>
            </div>
        </div>
    </div>

    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
